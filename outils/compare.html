<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparateur de listes</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --border: #333;
      --text: #e0e0e0;
      --secondary: #a0a0a0;
      --accent: #7baaf7;
      --red: #e57373;
      --green: #66BB6A;
      --orange: #FFB74D;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
      text-transform: lowercase;
    }
    .subtitle {
      font-size: 13px;
      color: var(--secondary);
      margin-bottom: 30px;
      text-transform: lowercase;
    }
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .compare-col label {
      display: block;
      font-size: 12px;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .compare-col .hint {
      font-size: 11px;
      color: var(--secondary);
      opacity: 0.5;
      margin-bottom: 8px;
      text-transform: lowercase;
    }
    textarea {
      width: 100%;
      height: 180px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      color: var(--text);
      font-family: 'Space Grotesk', monospace;
      font-size: 12px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--secondary); opacity: 0.4; }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 6px;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
    }
    .upload-zone:hover { border-color: var(--accent); }
    .upload-zone.has-file { border-color: var(--green); border-style: solid; }
    .upload-zone input { display: none; }
    .upload-icon {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--secondary);
      opacity: 0.5;
    }
    .upload-text {
      font-size: 13px;
      color: var(--secondary);
      text-transform: lowercase;
    }
    .upload-filename {
      font-size: 12px;
      color: var(--green);
      margin-top: 6px;
      display: none;
    }
    .upload-zone.has-file .upload-filename { display: block; }
    .upload-zone.has-file .upload-text { display: none; }
    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }
    button {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: lowercase;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.primary:hover { opacity: 0.85; }
    .results { display: none; }
    .results.visible { display: block; }
    .result-section { margin-bottom: 25px; }
    .result-header {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .result-header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .result-header .count {
      font-size: 11px;
      color: var(--secondary);
      opacity: 0.6;
    }
    .result-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      max-height: 300px;
      overflow-y: auto;
    }
    .result-list::-webkit-scrollbar { width: 4px; }
    .result-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .result-item {
      padding: 8px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item .id {
      font-size: 11px;
      color: var(--secondary);
      opacity: 0.5;
    }
    .result-empty {
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--secondary);
      opacity: 0.5;
    }
    .error-msg {
      background: rgba(229,115,115,0.1);
      border: 1px solid var(--red);
      border-radius: 6px;
      padding: 12px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.visible { display: block; }
    .summary {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 15px 20px;
      flex: 1;
      min-width: 120px;
      text-align: center;
    }
    .summary-card .num {
      font-size: 24px;
      font-weight: 600;
    }
    .summary-card .label {
      font-size: 11px;
      color: var(--secondary);
      text-transform: lowercase;
      margin-top: 4px;
    }
    @media(max-width:600px) {
      .compare-grid { grid-template-columns: 1fr; }
      .summary { flex-direction: column; }
    }
  </style>
</head>
<body>

  <h1>comparateur de listes</h1>
  <p class="subtitle">compare ta liste locale avec un export mal (completed uniquement)</p>

  <div class="error-msg" id="error"></div>

  <div class="compare-grid">
    <div class="compare-col">
      <label>mon site</label>
      <div class="hint">colle le contenu de ton fichier de données (anime-data.js)</div>
      <textarea id="list-a" placeholder='  { id: 52909, title: "Eguo", note: null, tags: ["short","archived"] },
  { id: 21, title: "One Piece", note: 5, tags: ["normal episode"] },
...'></textarea>
    </div>
    <div class="compare-col">
      <label>export mal</label>
      <div class="hint">upload ton fichier xml exporté depuis mal</div>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept=".xml">
        <div class="upload-icon">↑</div>
        <div class="upload-text">clique ou glisse ton fichier xml ici</div>
        <div class="upload-filename" id="upload-filename"></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="primary" id="btn-compare">comparer</button>
    <button id="btn-clear">vider</button>
  </div>

  <div class="results" id="results">
    <div class="summary" id="summary"></div>
    <div id="sections"></div>
  </div>

  <script>
    var malXmlText = '';

    var uploadZone = document.getElementById('upload-zone');
    var fileInput = document.getElementById('file-input');
    var uploadFilename = document.getElementById('upload-filename');

    uploadZone.addEventListener('click', function() { fileInput.click(); });

    uploadZone.addEventListener('dragover', function(e) {
      e.preventDefault();
      uploadZone.style.borderColor = 'var(--accent)';
    });

    uploadZone.addEventListener('dragleave', function(e) {
      e.preventDefault();
      uploadZone.style.borderColor = uploadZone.classList.contains('has-file') ? 'var(--green)' : 'var(--border)';
    });

    uploadZone.addEventListener('drop', function(e) {
      e.preventDefault();
      uploadZone.style.borderColor = '';
      if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', function() {
      if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      if (!file.name.endsWith('.xml')) {
        showError('le fichier doit être un .xml');
        return;
      }
      var reader = new FileReader();
      reader.onload = function(e) {
        malXmlText = e.target.result;
        uploadZone.classList.add('has-file');
        uploadFilename.textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + ' ko)';
        hideError();
      };
      reader.onerror = function() {
        showError('impossible de lire le fichier');
      };
      reader.readAsText(file);
    }

    function parseSiteList(text) {
      text = text.replace(/^(const|let|var)\s+\w+\s*=\s*/, '');
      try {
        var data = JSON.parse(text);
        if (!Array.isArray(data)) throw new Error('pas un tableau');
        return data;
      } catch(e) {
        try {
          var data = (new Function('return [' + text + ']'))();
          if (!Array.isArray(data)) throw new Error('pas un tableau');
          return data;
        } catch(e2) {
          return null;
        }
      }
    }

    function parseMalXml(text) {
      try {
        var parser = new DOMParser();
        var doc = parser.parseFromString(text, 'text/xml');
        var items = doc.querySelectorAll('anime');
        if (items.length === 0) items = doc.querySelectorAll('manga');
        if (items.length === 0) return null;

        var result = [];
        items.forEach(function(item) {
          var statusNode = item.querySelector('my_status');
          if (!statusNode || statusNode.textContent.trim() !== 'Completed') return;
          var idNode = item.querySelector('series_animedb_id') || item.querySelector('manga_mangadb_id');
          var titleNode = item.querySelector('series_title') || item.querySelector('manga_title');
          if (idNode && titleNode) {
            result.push({
              id: parseInt(idNode.textContent),
              title: titleNode.textContent
            });
          }
        });
        return result.length > 0 ? result : null;
      } catch(e) {
        return null;
      }
    }

    function findDoublons(list) {
      var seen = {};
      var doublons = [];
      list.forEach(function(item) {
        if (seen[item.id]) {
          if (!seen[item.id].flag) {
            doublons.push(seen[item.id].item);
            seen[item.id].flag = true;
          }
          doublons.push(item);
        } else {
          seen[item.id] = { item: item, flag: false };
        }
      });
      return doublons;
    }

    function renderList(items) {
      if (items.length === 0) return '<div class="result-empty">aucun</div>';
      return items.map(function(item) {
        var title = item.title || 'sans titre';
        return '<div class="result-item"><span>' + title + '</span><span class="id">' + item.id + '</span></div>';
      }).join('');
    }

    function renderSection(label, color, items) {
      return '<div class="result-section">' +
        '<div class="result-header"><span class="dot" style="background:' + color + '"></span>' + label + '<span class="count">' + items.length + '</span></div>' +
        '<div class="result-list">' + renderList(items) + '</div>' +
        '</div>';
    }

    function showError(msg) {
      var el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('error').classList.remove('visible');
    }

    document.getElementById('btn-compare').addEventListener('click', function() {
      hideError();

      var textA = document.getElementById('list-a').value.trim();

      if (!textA) {
        showError('colle le contenu de ton fichier de données dans la zone de gauche');
        return;
      }
      if (!malXmlText) {
        showError('upload ton fichier xml mal dans la zone de droite');
        return;
      }

      var listA = parseSiteList(textA);
      if (!listA) {
        showError('le contenu de ton fichier n\'a pas pu être lu');
        return;
      }

      var listB = parseMalXml(malXmlText);
      if (!listB) {
        showError('le fichier xml mal n\'a pas pu être lu ou ne contient aucun completed');
        return;
      }

      var doublonsA = findDoublons(listA);
      var doublonsB = findDoublons(listB);

      var idsA = {};
      var idsB = {};

      listA.forEach(function(item) { idsA[item.id] = item; });
      listB.forEach(function(item) { idsB[item.id] = item; });

      var onlyInA = [];
      var onlyInB = [];
      var inBoth = 0;

      listA.forEach(function(item) {
        if (idsB[item.id]) {
          inBoth++;
        } else {
          onlyInA.push(item);
        }
      });

      listB.forEach(function(item) {
        if (!idsA[item.id]) {
          onlyInB.push(item);
        }
      });

      var summary = document.getElementById('summary');
      summary.innerHTML =
        '<div class="summary-card"><div class="num">' + listA.length + '</div><div class="label">mon site</div></div>' +
        '<div class="summary-card"><div class="num">' + listB.length + '</div><div class="label">mal (completed)</div></div>' +
        '<div class="summary-card"><div class="num" style="color:var(--green)">' + inBoth + '</div><div class="label">en commun</div></div>' +
        '<div class="summary-card"><div class="num" style="color:var(--red)">' + onlyInA.length + '</div><div class="label">seulement sur le site</div></div>' +
        '<div class="summary-card"><div class="num" style="color:var(--orange)">' + onlyInB.length + '</div><div class="label">seulement sur mal</div></div>';

      if (doublonsA.length > 0) {
        summary.innerHTML += '<div class="summary-card"><div class="num" style="color:var(--red)">' + doublonsA.length + '</div><div class="label">doublons site</div></div>';
      }
      if (doublonsB.length > 0) {
        summary.innerHTML += '<div class="summary-card"><div class="num" style="color:var(--red)">' + doublonsB.length + '</div><div class="label">doublons mal</div></div>';
      }

      var sections = '';
      if (onlyInA.length > 0) sections += renderSection('sur le site mais pas sur mal (à retirer du site)', '#e57373', onlyInA);
      if (onlyInB.length > 0) sections += renderSection('sur mal mais pas sur le site (à ajouter au site)', '#FFB74D', onlyInB);
      if (doublonsA.length > 0) sections += renderSection('doublons sur le site', '#e57373', doublonsA);
      if (doublonsB.length > 0) sections += renderSection('doublons sur mal', '#e57373', doublonsB);

      document.getElementById('sections').innerHTML = sections;
      document.getElementById('results').classList.add('visible');
    });

    document.getElementById('btn-clear').addEventListener('click', function() {
      document.getElementById('list-a').value = '';
      malXmlText = '';
      uploadZone.classList.remove('has-file');
      uploadFilename.textContent = '';
      fileInput.value = '';
      document.getElementById('results').classList.remove('visible');
      hideError();
    });
  </script>
</body>
</html>
